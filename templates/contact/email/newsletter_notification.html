<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Newsletter Subscription</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4; padding: 20px;">
    <tr>
      <td>
        <table width="600" align="center" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
          {% if logo_url %}
          <!-- Header -->
          <tr>
            <td style="padding: 20px; text-align: center; background-color: #ffffff; border-bottom: 1px solid #eeeeee;">
              <img src="{{ logo_url }}" alt="{{ store_name }} Logo" width="200" style="display: block; margin: 0 auto;">
            </td>
          </tr>
          {% endif %}
          
          <!-- Content -->
          <tr>
            <td style="padding: 40px 30px;">
              <h2 style="color: #333; margin-top: 0;">New Newsletter Subscription</h2>
              <p>You have received a new newsletter subscription.</p>
              
              <table width="100%" cellpadding="10" cellspacing="0" border="0" style="margin-top: 20px; border: 1px solid #eeeeee; border-radius: 4px;">
                <tr>
                  <td width="30%" style="background-color: #f9f9f9; font-weight: bold;">Email:</td>
                  <td><a href="mailto:{{ email }}" style="color: #2e58ff;">{{ email }}</a></td>
                </tr>
              </table>
              
              <div style="margin-top: 30px; text-align: center;">
                <p style="font-size: 14px; color: #666;">This is an automated notification from <strong>{{ store_name }}</strong>.</p>
              </div>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td style="padding: 20px; text-align: center; background-color: #f9f9f9; border-top: 1px solid #eeeeee;">
              <p style="font-size: 12px; color: #999; margin: 0;">&copy; {{ current_year }} {{ store_name }}. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
